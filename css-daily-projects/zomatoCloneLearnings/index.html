<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato-food dilevery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="head-box">
            <div class="heading hbox">
                <p>zomato</p>
            </div>
            <div class="location hbox">
                <select name="location" id="location" >
                    <option default > patna road bhabua</option>
                    <option value="liveLocation">Detect Live Location</option>
                </select>
            </div>
            <div class="search hbox">
                <input type="text" placeholder="Search for resturent,cusine or a dish">
            </div>
            <div class="login hbox">
                <button >Login</button>
            </div>
            <div class="signup hbox">
                <button>Sign Up</button>
            </div>
        </div>

    </header>
    <main>
        <div class="card">
            <div class="image">
                <img src="../../assets/card2.png" alt="card2 image" class="img">
                <p class="off">Flat 25% off </p>
            </div>

            <div class="resturant">
                <div class="resturant_name box">
                    <p>The darzi bar and kitchen</p>
                </div>
                <div class="rating box">
                    <p>4.2*</p>
                </div>
            </div>

            <div class="food">
                <div class="food_name box">
                    <p>north indian,chinese</p>
                </div>

                <div class="price box">
                    <p>&#8377; 2,800</p>
                </div>

            </div>
            <div class="place">
                <div class="address box">
                    <p>Middle Circle,cp</p>
                </div>
                <div class="distance box">
                    <p>1.4Km</p>
                </div>
            </div>


        </div>
    </main>
</body>
</html>
