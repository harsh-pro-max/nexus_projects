<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow - clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!-- header parts -->
        <div class="head">
            <div class="logo">
                <div class="left">
                    <h1>BookMyShow</h1>
                </div>
                

                <div class="right">
                    <button>Movies</button><button>Events</button><button>Sports</button><button>More</button>
                </div>
           
            </div>

            <div class="search">
                    <input type="text" id="search" placeholder="Search for movies events and sports..." class="searching">
                    <button>Search</button>
            </div>
        </div>
    </header>

    <!-- main content area -->
     <main>
        <!-- hero section -->
         <div class="hero">
            <h2>Exprience the Best Movies and Events</h2>
            <button>Book Now</button>
         </div>
         <!-- movies book suggestion part -->
         <div class="mover">
            <h2>Popular Movies</h2>
         </div>

         <!-- movies card -->
        <div class="movie">

        
          <div class="card">
            <img src="./assets/border2.avif" alt="border 2" class="images">
            <h3>Border 2</h3>
          </div>

          <div class="card">
            <img src="./assets/avatar.avif" alt="Avatar" class="images">
            <h3>Avatar fire</h3>
          </div>

          <div class="card">
            <img src="./assets/crime101.avif" alt="Crime 101" class="images">
            <h3>Crime 101</h3>
          </div>

          <div class="card">
            <img src="./assets/mardaani3.avif" alt="Mardaani 3" class="images">
            <h3>Mardaani 3</h3>
          </div>


          <div class="card">
            <img src="./assets/ameena.avif" alt="ameena" class="images">
            <h3>Ameena</h3>
          </div>

          <div class="card">
            <img src="./assets/saiyaara.avif" alt="Saiyaara" class="images">
            <h3>Saiyaara</h3>
          </div>

          <div class="card">
            <img src="./assets/sanamTerikasam.avif" alt="Mardaani 3" class="images">
            <h3>SanamTeriKasam</h3>
          </div>


        </div>

        <div class="bot">
            <img src="./assets/footer.avif" alt="bottom" >
        </div>
     </main>
    
</body>
</html>
