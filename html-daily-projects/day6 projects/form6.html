<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Details Form</title>
</head>
<body>
    <h1>Health Details Form</h1>
    <form action="">
        <fieldset>
            <!-- Full name -->
            <legend>Personal Information</legend>
            <label for="name">Full Name:</label>
            <input type="text" id="name" value="Harsh kushwaha" name="fname">
            <br><br>

            <!-- Date of Birth -->
            <label for="dob">Date of Birth:</label>
            <input type="date" value="2026/02/06"  name="dob" id="dob">
            <!-- Gender select -->
            <br><br>
            <label for="gender">Gender:</label>
            <select name="gender" id="gender">
                <option value="male" >male</option>
                <option value="female">female</option>
                <option value="other">other</option>
            </select>
            <br><br>
            <!-- Phone Number -->
            <label for="phone">Phone:</label>
            <input type="number" id="phone" name="phone" value="8228862120">
        </fieldset>

        <fieldset>
            <legend>Medical History</legend>
            <label for="bloodgroup">Blood Group:</label>
            <select name="bgroup" id="bloodgroup">
                <option value="a+" selected>a+</option>
                <option value="a-">a-</option>
                <option value="b+">b+</option>
                <option value="b-">b-</option>
                <option value="o+">o+</option>
                <option value="ab">ab</option>
            </select>
            <br><br>
            <label for="eyeglass">Do you wear glassess or contact lensess </label>
            <br><br>
            <input type="radio" name="eyeglass" id="yes" value="yes">
            <label for="yes">Yes</label>
            <br>

            <input type="radio" name="eyeglass" id="no" value="no">
            <label for="no">No</label>

            <br><br>
            <label for="condition">Pre-existing Condition</label><br>
            <textarea name="condition" id="condition" value="" cols="25" rows="4">List any curretn medications </textarea>

            <br><br>
            <label for="allergies">Allergies:</label>
            <br>
            <input type="checkbox" id="pollen" value="pollen" name="allergies">
            <label for="pollen" >Pollen</label>

            <br>
            <input type="checkbox" id="peanuts" value="peanuts" name="allergies">
            <label for="peanuts" >peanuts</label>

            <br>
            <input type="checkbox" id="latex" name="allergies" value="latex">
            <label for="latex" >Latex</label>

            <br>
            <input type="checkbox" id="none" value="none" name="allergies">
            <label for="none">none</label>

            <br><br>
            <label for="meditation">Current Medications:</label><br>
            <textarea name="meditation" id="meditation" value="" cols="25" rows="4">List any curretn medications </textarea>

        </fieldset>

        <fieldset>
            <legend>Emergency Contact</legend>
            <label for="patent">Emergency Contact Name:</label>
            <input type="text" id="patent" value="" name="patent">
            <br><br>

            <label for="patentPhone">Emergency Contact Phone:</label>
            <input type="text" id="patentPhone" value="" name="phone">
            <br><br>

            <label for="relation">Relationship to Emergency Contact </label>
            <input type="text" id="relation" value="" name="relation">
            <br><br>
        </fieldset>

        <button>Submit</button>
    </form>

</body>
</html>
