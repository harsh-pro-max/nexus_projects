<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Employee Details Form </h1>
    </header>
    <main>
        <form action="">
            <label for="name">Full Name:</label>
            <input type="text" placeholder="Enter your Full name" id="name" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" placeholder="Enter your email address" required>

            <br><br>
            <label for="number">Phone Number:</label>
            <input type="number" id="number" placeholder="Enter your phone number">
            <br><br>

            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" >
            <label for="female">Female</label>
            
            <input type="radio" id="other" name="gender" >
            <label for="other">Other</label>
            
            <br><br>
            <label for="job">Job Title</label>
            <input type="text" placeholder="Enter your job title">

            <br><br>
            <label for="department">Department:</label>
            <select name="deparment" id="department" >
                <option value="bca" selected="true">select your department </option>
                <option value="science">Science</option>
                <option value="arts">Arts</option>
                <option value="commerce">commerce</option>
            </select>
            <br><br>

            <button>Submit</button>

        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
