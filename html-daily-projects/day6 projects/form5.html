<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIT JEE Registration Form</title>
</head>
<body>

    <form action="#" method="post">
        <fieldset>
            <legend>IIT JEE Registration Form</legend>

            <!-- Full Name -->
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="full_name" value="Harsh Kushwaha" required>
            <br><br>

            <!-- Email -->
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" value="harsh123@gmail.com" required>
            <br><br>

            <!-- Phone -->
            <label for="phone">Mobile Number:</label>
            <input type="tel" id="phone" name="phone" value="8228862120" required>
            <br><br>

            <!-- Password -->
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>

            <!-- Gender -->
            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
            <br><br>

            <!-- Date of Birth -->
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" min="2001-01-01" max="2005-12-01" required>
            <br><br>

            <!-- School Name -->
            <label for="school">School Name:</label>
            <input type="text" id="school" name="school_name" value="BHU" required>
            <br><br>

            <!-- Board -->
            <label for="board">Board:</label>
            <select id="board" name="board" required>
                <option value="">Select your board</option>
                <option value="bseb">BSEB</option>
                <option value="cbse">CBSE</option>
                <option value="upsc">UPSC</option>
                <option value="bpsc">BPSC</option>
            </select>
            <br><br>

            <!-- Year of Passing -->
            <label for="passingYear">Year of Passing:</label>
            <input type="number" id="passingYear" name="passing_year" value="2023" min="2021" max="2025" required>
            <br><br>

            <!-- Exam Center -->
            <label for="examCenter">Exam Center:</label>
            <select id="examCenter" name="exam_center" required>
                <option value="">Select exam center</option>
                <option value="bhabua">Bhabua</option>
                <option value="mohaniya">Mohaniya</option>
                <option value="hata">Hata</option>
            </select>
            <br><br>

            <!-- Submit Button -->
            <button type="submit">Register</button>

        </fieldset>
    </form>

</body>
</html>
