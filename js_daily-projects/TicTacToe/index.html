<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="player1">
            <button contenteditable="true">Player O</button>
            <img src="./assets/rohitbhaiy.png" alt="player 1" class="player" id="O">
        </div>
        <div class="ticTacToe">
            <h1>Tic Tac Toe</h1>
            <div class="board">
                <div class="cell" id="0"></div>
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
            </div>
            <button id="restartButton">Restart Game</button>
            <p class="winning-message" id="winningMessage">
            </p>

        </div>
        <div class="player2">
            <button contenteditable="true">player X</button>
            <img src="./assets/harsh.png" alt="player 1" class="player" id="X">
        </div>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
